<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe</title>
  <style>
    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 5px;
      width: 310px;
      margin: 20px auto;
    }

    .cell {
      width: 100px;
      height: 100px;
      font-size: 40px;
      text-align: center;
      line-height: 100px;
      border: 2px solid black;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2 style="text-align:center">Tic Tac Toe</h2>

<div id="board"></div>

<script src="TicTacToe.js"></script>
</body>
</html>
