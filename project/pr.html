<!DOCTYPE html>
<html lang="uk">
<head>

<title>My Library</title>

</head>

<body>

<dialog id="bookDialog">
<form id="bookForm">

<label>
Read

</label>

</form>
</dialog>

<div id="library"></div>

<script src="pr.js"></script>

</body>
</html>
